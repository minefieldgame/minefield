version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - printf "OPENAI_API_KEY=%s\n" "$OPENAI_API_KEY" >> .env.production
        - printf "OPENAI_MODEL=%s\n" "${OPENAI_MODEL:-gpt-5.4-mini}" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
